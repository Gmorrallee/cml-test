name: Terraform Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  # Default subscription for the *initial* provider context (ok to leave as identity)
  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_IDENTITY }}

  # Pass a JSON string into Terraform as TF_VAR_subscriptions
  TF_VAR_subscriptions: |
    {
      "identity":     "${{ vars.AZURE_SUBSCRIPTION_ID_IDENTITY }}",
      "connectivity": "${{ vars.AZURE_SUBSCRIPTION_ID_CONNECTIVITY }}",
      "management":   "${{ vars.AZURE_SUBSCRIPTION_ID_MANAGEMENT }}"
    }

jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          # any subscription is fine here; provider aliases will override when configured in TF
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID_IDENTITY }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
