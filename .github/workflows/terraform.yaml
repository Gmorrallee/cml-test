name: Terraform Deploy

on:
  push:
    branches: [ "main" ]
  pull_request:

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC: true
  ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
  ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

  ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID_MANAGEMENT }}

  TF_VAR_subnets: ${{ vars.TF_IDENTITY_SUBNETS }}

  TF_VAR_subscriptions: |
    {
      "identity": "${{ vars.AZURE_SUBSCRIPTION_ID_IDENTITY }}",
      "connectivity": "${{ vars.AZURE_SUBSCRIPTION_ID_CONNECTIVITY }}",
      "management": "${{ vars.AZURE_SUBSCRIPTION_ID_MANAGEMENT }}"
    }


jobs:
  terraform:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main'
        run: terraform apply -auto-approve
